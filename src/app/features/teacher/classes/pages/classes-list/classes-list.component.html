<div class="p-6 md:p-8 max-w-7xl mx-auto space-y-6">

  <!-- HEADER -->
  <div class="flex justify-between items-center bg-white p-6 rounded-3xl border-4 border-black shadow">
    <div>
      <h1 class="text-3xl font-black">My Classes</h1>
      <p class="text-gray-600">Manage your classes</p>
    </div>

    @if (!createMode()) {
      <button
        (click)="onCreateClass()"
        class="px-4 py-2 bg-[#0ABAB5] text-white font-black rounded-xl border-2 border-black cursor-pointer hover:bg-[#089692] transition-colors"
      >
        Create Class
      </button>
    }
  </div>

  <!-- CREATE CLASS FORM BLOCK -->
  @if (createMode()) {
    <div class="bg-white p-6 rounded-3xl border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] space-y-4">
      <h2 class="text-xl font-black text-black">New Class</h2>
      
      <div class="space-y-3">
        <label class="block">
          <span class="text-sm font-bold mb-1 block">Class Name *</span>
          <input
            [ngModel]="newClassName()"
            (ngModelChange)="newClassName.set($event)"
            placeholder="e.g. Algebra 101"
            class="w-full px-4 py-2 border-2 border-black rounded-xl font-medium"
            aria-label="Class name"
          />
        </label>
        
        <label class="block">
          <span class="text-sm font-bold mb-1 block">Description</span>
          <textarea
            [ngModel]="newClassDescription()"
            (ngModelChange)="newClassDescription.set($event)"
            placeholder="Brief description of the class"
            rows="3"
            class="w-full px-4 py-2 border-2 border-black rounded-xl font-medium"
            aria-label="Class description"
          ></textarea>
        </label>
      </div>

      <div class="flex gap-3">
        <button
          (click)="submitCreate()"
          class="px-4 py-2 bg-[#0ABAB5] text-white font-black rounded-xl border-2 border-black cursor-pointer hover:bg-[#089692] transition-colors"
        >
          Create
        </button>
        <button
          (click)="cancelCreate()"
          class="px-4 py-2 bg-gray-200 text-black font-black rounded-xl border-2 border-black cursor-pointer hover:bg-gray-300 transition-colors"
        >
          Cancel
        </button>
      </div>
    </div>
  }

  <!-- REFRESH -->
  <button
    (click)="store.loadClasses()"
    class="px-3 py-2 border-2 border-black rounded-xl bg-white font-bold"
  >
    Refresh
  </button>

  <!-- LOADING -->
  @if (store.loading()) {
    <div class="text-gray-500 font-bold">Loading...</div>
  }

  <!-- GRID CARDS -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

    @for (c of store.classes(); track c.id) {
      <div class="p-5 bg-white border-4 border-black rounded-2xl shadow">

        <h3 class="text-xl font-black">{{ c.name }}</h3>

        <p class="text-sm text-gray-600 mt-2">
          Students: {{ c.studentCount }}
        </p>

        <p class="text-sm text-gray-600">
          Lessons: {{ c.lessonCount }}
        </p>

        <p class="text-xs text-gray-500 mt-2">
          {{ c.createdAt | date }}
        </p>

        <div class="flex gap-2 mt-4">

          <button
            [routerLink]="['/teacher/classes', c.id]"
            class="px-3 py-1 border-2 border-black rounded-lg font-bold"
          >
            View
          </button>

          <button class="px-3 py-1 border-2 border-black rounded-lg">
            Edit
          </button>

          <button
            (click)="onDelete(c.id)"
            class="px-3 py-1 border-2 border-red-500 text-red-600 rounded-lg font-bold"
          >
            Delete
          </button>

        </div>
      </div>
    }

  </div>
</div>
