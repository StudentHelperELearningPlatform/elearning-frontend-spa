# ================================================================
# Deploy to Staging - Runs on merge to develop
# ================================================================
# Builds the app with staging config and deploys.
# Deployment target is abstracted into a single "deploy" step
# so swapping between S3, Docker/K8s, or Vercel is minimal work.
# ================================================================

name: Deploy to Staging

on:
  push:
    branches: [develop]

# Only one staging deploy at a time
concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  build:
    name: Build (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (staging config)
        run: npm run build -- --configuration staging

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-dist
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging
      url: https://staging.elearning-platform.example.com  # Update when URL is known

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: staging-dist
          path: dist/

