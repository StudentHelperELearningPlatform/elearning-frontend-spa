# ================================================================
# Deploy to Production - Runs on merge to main
# ================================================================
# Requires manual approval via GitHub Environments.
# Tags the release with a version number.
# ================================================================

name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel a production deploy

env:
  NODE_VERSION: '22'

jobs:
  build:
    name: Build (production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production config)
        run: npm run build -- --configuration production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist/
          retention-days: 30

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # ---- MANUAL APPROVAL: Configure this environment in GitHub ----
    # Go to: Repo Settings > Environments > New environment > "production"
    # Add Andrew as a required reviewer.
    # Deployments will pause here until Andrew approves.
    environment:
      name: production
      url: https://elearning-platform.example.com  # Update when URL is known

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist/

      # Same deployment step structure as staging.
      # Swap the commented block based on deployment target.

      - name: Production deploy placeholder
        run: |
          echo "=== Production deploy placeholder ==="
          echo "Build artifacts ready. Deployment target not yet configured."
          ls -la dist/

  tag-release:
    name: Tag Release
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
